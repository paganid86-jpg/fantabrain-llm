project:
  name: fantabrain-llm
  run_name: llama31-8b-fantabrain-sft-v0

data:
  train_path: data/processed/train.jsonl
  eval_path: data/eval/eval.jsonl

model:
  base_model: meta-llama/Llama-3.1-8B-Instruct
  trust_remote_code: false
  load_in_4bit: true
  torch_dtype: bfloat16
  device_map: auto
  bnb_4bit_quant_type: nf4
  use_nested_quant: true

training:
  output_dir: models/adapters/llama31-8b-fantabrain-sft-v0
  max_length: 4096
  num_train_epochs: 2
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.0002
  warmup_ratio: 0.03
  logging_steps: 5
  save_steps: 100
  eval_steps: 100
  eval_strategy: steps
  packing: false
  assistant_only_loss: false
  report_to: none
  seed: 42

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
